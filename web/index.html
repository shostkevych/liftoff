<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Liftoff — Remote</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.min.css" />
<style>
  :root { --brand: #E86F4A; }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; background: #0a0a0a; color: #eaeaea;
    font: 14px/1.4 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
  body { display: flex; min-height: 0; }

  .btn { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12);
    color: #eee; border-radius: 8px; padding: 6px 12px; cursor: pointer; }
  .btn:hover { background: rgba(255,255,255,0.14); }

  .brand-head { display: flex; align-items: center; gap: 10px; margin-bottom: 16px;
    padding-bottom: 14px; border-bottom: 1px solid rgba(255,255,255,0.08); }
  .brand-head img { width: 30px; height: 30px; border-radius: 7px; }
  .brand-head .name { font-size: 16px; font-weight: 700; color: #ddd; }
  .state { margin-left: auto; font-size: 11px; font-weight: 600; white-space: nowrap;
    padding: 3px 9px; border-radius: 20px; display: inline-flex; align-items: center; gap: 6px;
    color: #bbb; background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.1); }
  .state::before { content: ''; width: 7px; height: 7px; border-radius: 50%; background: currentColor; }
  .state.ok { color: #6bd06b; background: rgba(107,208,107,0.12); border-color: rgba(107,208,107,0.3); }
  .state.connecting { color: #e3b341; background: rgba(227,179,65,0.12); border-color: rgba(227,179,65,0.3); }
  .state.error { color: #e86f4a; background: rgba(232,111,74,0.12); border-color: rgba(232,111,74,0.3); }

  main { flex: 1; display: flex; min-height: 0; padding: 8px; gap: 8px; }
  aside { width: 290px; overflow-y: auto; padding: 16px;
    background: rgba(255,255,255,0.025); border: 1px solid rgba(255,255,255,0.08);
    border-radius: 14px; }
  .greeting { font-style: italic; color: #999; font-size: 13px; text-align: center;
    margin: 6px 0 18px; }
  .proj { margin-bottom: 16px; }
  .proj-head { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; padding: 0 2px; }
  .bar { width: 3px; height: 15px; border-radius: 2px; background: #888; }
  .proj-head .name { font-weight: 700; font-size: 13px; }
  .proj-head .count { margin-left: auto; color: #777; font-size: 12px; }
  .proj-head .add { cursor: pointer; color: var(--brand); font-size: 18px; line-height: 1; }
  .tab { display: flex; align-items: center; gap: 8px; padding: 10px 12px; margin-bottom: 6px;
    background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08);
    border-radius: 10px; cursor: pointer; }
  .tab:hover { background: rgba(255,255,255,0.1); }
  .tab.active { border-color: var(--brand); }
  .tab .agent { margin-left: auto; font-size: 10px; font-weight: 700; color: #fff;
    background: rgba(232,111,74,0.4); padding: 2px 7px; border-radius: 20px; }
  .tab .title { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .tab .close { margin-left: auto; color: #888; font-size: 16px; line-height: 1;
    padding: 0 4px; border-radius: 6px; opacity: 0; transition: opacity 0.12s, background 0.12s; }
  .tab:hover .close { opacity: 1; }
  .tab .close:hover { color: #fff; background: rgba(232,80,80,0.5); }
  .tab .agent + .close { margin-left: 6px; }
  h2 { font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; color: #777; margin: 18px 0 8px; }
  h2.collapsible { cursor: pointer; user-select: none; display: flex; align-items: center; gap: 6px; }
  h2.collapsible .caret { transition: transform 0.15s; display: inline-block; }
  h2.collapsible.open .caret { transform: rotate(90deg); }
  #recents.collapsed { display: none; }
  .recent { display: flex; align-items: center; gap: 8px; padding: 9px 12px; margin-bottom: 6px;
    background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
    border-radius: 10px; cursor: pointer; }
  .recent:hover { background: rgba(255,255,255,0.09); }
  .recent .meta { overflow: hidden; }
  .recent .meta .nm { font-weight: 600; font-size: 14px; }
  .recent .meta .pp { font-size: 11px; color: #777; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  section.term { flex: 1; position: relative; background: #000; min-width: 0;
    border: 1px solid rgba(255,255,255,0.08); border-radius: 14px; overflow: hidden; }
  #terminal { position: absolute; inset: 8px; }

  /* Covers the terminal when nothing is attached (disconnected, or no pane picked)
     so a stale screen is never shown after the Mac goes away. */
  .term-empty { position: absolute; inset: 0; z-index: 4; display: none;
    flex-direction: column; align-items: center; justify-content: center;
    text-align: center; padding: 30px; gap: 6px; background: #000; }
  .term-empty img { width: 64px; height: 64px; border-radius: 14px; opacity: 0.5; margin-bottom: 8px; }
  .term-empty .te-title { font-size: 18px; font-weight: 600; color: #ccc; }
  .term-empty .te-msg { font-size: 13px; color: #888; max-width: 320px; line-height: 1.5; }

  /* Empty state: no projects open — mirror the desktop app's centered picker. */
  #picker { flex: 1; display: none; flex-direction: column; align-items: center;
    justify-content: center; padding: 40px 24px; overflow-y: auto; }
  body.empty main { display: none; }
  body.empty #picker { display: flex; }
  #picker .picker-icon { width: 72px; height: 72px; border-radius: 16px; opacity: 0.7; }
  #picker .picker-title { font-size: 24px; font-weight: 600; color: #bbb; margin-top: 18px; }
  #picker #picker-greeting { margin: 12px 0 4px; }
  #picker .state { margin: 14px 0 4px; }
  #picker .picker-recents { width: 100%; max-width: 460px; margin-top: 22px; }
  #picker .picker-recents h2 { margin: 0 0 8px; padding-left: 4px; }
  .term-bar { position: absolute; top: 8px; right: 14px; z-index: 5; }

  /* Passcode / blocked gate */
  .gate { position: fixed; inset: 0; z-index: 50; display: none; align-items: center; justify-content: center;
    background: rgba(5,5,5,0.86); backdrop-filter: blur(8px); }
  .gate.show { display: flex; }
  .gate-card { width: 340px; max-width: calc(100% - 40px); padding: 30px 26px; text-align: center;
    background: #121212; border: 1px solid rgba(255,255,255,0.1); border-radius: 16px;
    box-shadow: 0 18px 60px rgba(0,0,0,0.6); }
  .gate-card img { width: 54px; height: 54px; border-radius: 12px; opacity: 0.9; }
  .gate-card h1 { font-size: 19px; font-weight: 700; margin: 16px 0 8px; color: #f0f0f0; }
  .gate-card p { font-size: 13px; color: #9a9a9a; margin: 0 0 20px; line-height: 1.5; }
  .gate-card input { width: 100%; padding: 12px 14px; font-size: 15px; color: #eee; text-align: center;
    background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.14); border-radius: 10px;
    outline: none; letter-spacing: 0.1em; }
  .gate-card input:focus { border-color: var(--brand); }
  .gate-card button { width: 100%; margin-top: 14px; padding: 12px; font-size: 15px; font-weight: 600;
    color: #fff; background: var(--brand); border: none; border-radius: 10px; cursor: pointer; }
  .gate-card button:hover { filter: brightness(1.08); }
  .gate-err { color: #e86f4a; font-size: 12.5px; min-height: 18px; margin-top: 12px; }
  .gate.blocked input, .gate.blocked button { display: none; }
  .gate-blocked-icon { display: none; font-size: 40px; }
  .gate.blocked .gate-blocked-icon { display: block; }
</style>
</head>
<body class="empty">
<div id="picker">
  <img class="picker-icon" src="icon.png" alt="Liftoff" />
  <div class="picker-title">Liftoff</div>
  <div id="picker-greeting" class="greeting"></div>
  <span id="picker-state" class="state connecting">Connecting…</span>
  <div class="picker-recents">
    <h2 id="picker-recents-head" style="display:none">Recent Projects</h2>
    <div id="picker-recents-list"></div>
  </div>
</div>
<main>
  <aside>
    <div class="brand-head">
      <img src="icon.png" alt="Liftoff" />
      <span class="name">Liftoff</span>
      <span id="state" class="state connecting">Connecting…</span>
    </div>
    <div id="greeting" class="greeting"></div>
    <div id="projects"></div>
    <h2 id="recents-head" class="collapsible"><span class="caret">▸</span> Recent Projects</h2>
    <div id="recents" class="collapsed"></div>
  </aside>
  <section class="term">
    <div class="term-bar"><button id="detach" class="btn" style="display:none">Detach</button></div>
    <div id="terminal"></div>
    <div id="term-empty" class="term-empty">
      <img src="icon.png" alt="Liftoff" />
      <div id="te-title" class="te-title">No terminal selected</div>
      <div id="te-msg" class="te-msg">Pick a project terminal from the sidebar, or open a new pane.</div>
    </div>
  </section>
</main>

<div id="gate" class="gate">
  <div class="gate-card">
    <img src="icon.png" alt="Liftoff" />
    <div class="gate-blocked-icon">🔒</div>
    <h1 id="gate-title">Enter Passcode</h1>
    <p id="gate-msg">Enter the web password set on your Mac (Liftoff → Air → Set Web Password).</p>
    <input id="gate-input" type="password" inputmode="numeric" autocomplete="off" placeholder="Passcode" />
    <button id="gate-go">Unlock</button>
    <div id="gate-err" class="gate-err"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.min.js"></script>
<script>
const $ = (id) => document.getElementById(id);
let ws = null, attached = null;

const term = new Terminal({
  fontFamily: 'SFMono-Regular, Menlo, monospace', fontSize: 13,
  theme: { background: '#000000', foreground: '#ebebeb' }, cursorBlink: true,
});
const fit = new FitAddon.FitAddon();
term.loadAddon(fit);
term.open($('terminal'));
fit.fit();

// User keystrokes -> server
term.onData((data) => {
  if (ws && attached) send({ t: 'input', d: btoa(unescape(encodeURIComponent(data))) });
});

// Shift+Enter -> newline (ESC+CR, same as the desktop app; Claude Code etc. use it).
// Returning false makes xterm skip the key but it won't call preventDefault for us,
// so the hidden textarea would still emit a stray CR/LF and submit the line — we
// must preventDefault ourselves so only the ESC+CR we send reaches the program.
term.attachCustomKeyEventHandler((e) => {
  if (e.type === 'keydown' && e.key === 'Enter' && e.shiftKey) {
    e.preventDefault();
    if (ws && attached) send({ t: 'input', d: btoa('\x1b\r') });
    return false; // swallow the default carriage-return
  }
  return true;
});

// Drag & drop images (screenshots) -> upload to the Mac, which pastes the path.
const termEl = $('terminal');
['dragenter', 'dragover'].forEach(ev => termEl.addEventListener(ev, (e) => {
  e.preventDefault(); e.stopPropagation();
  e.dataTransfer.dropEffect = 'copy';
  termEl.style.outline = '2px dashed var(--brand)';
}));
['dragleave', 'drop'].forEach(ev => termEl.addEventListener(ev, (e) => {
  e.preventDefault(); e.stopPropagation();
  termEl.style.outline = '';
}));
termEl.addEventListener('drop', (e) => {
  if (!ws || !attached) return;
  const files = [...(e.dataTransfer.files || [])].filter(f => f.type.startsWith('image/'));
  for (const file of files) {
    const reader = new FileReader();
    reader.onload = () => {
      const b64 = reader.result.split(',')[1]; // strip "data:...;base64,"
      send({ t: 'upload', name: file.name || 'screenshot.png', d: b64 });
    };
    reader.readAsDataURL(file);
  }
  term.focus();
});

// On resize, tell the Mac our grid (drives the 1:1 reflow)
function reportSize() {
  if (ws && attached) send({ t: 'resize', cols: term.cols, rows: term.rows });
}
new ResizeObserver(() => { fit.fit(); reportSize(); }).observe($('terminal'));

function send(obj) { try { ws.send(JSON.stringify(obj)); } catch (e) {} }
function b64ToBytes(b) { return Uint8Array.from(atob(b), c => c.charCodeAt(0)); }

// status: 'live' | 'connecting' | 'error'
function setState(status, label) {
  const cls = 'state ' + (status === 'live' ? 'ok' : status);
  for (const id of ['state', 'picker-state']) {
    const el = $(id); if (!el) continue;
    el.textContent = label; el.className = cls;
  }
  updateTermView();
}

// Show the overlay whenever nothing is attached: a disconnected notice if the
// link is down, otherwise a prompt to pick/open a terminal.
function updateTermView() {
  const overlay = $('term-empty');
  if (!overlay) return;
  if (attached) { overlay.style.display = 'none'; return; }
  const live = ws && ws.readyState === WebSocket.OPEN;
  $('te-title').textContent = live ? 'No terminal selected' : 'Disconnected';
  $('te-msg').textContent = live
    ? 'Pick a project terminal from the sidebar, or open a new pane.'
    : 'Lost connection to your Mac. Reconnecting…';
  overlay.style.display = 'flex';
}

let connectTimer = null;
function connect() {
  // Served by the main app — talk to the WebSocket on the same host.
  const host = location.hostname || 'localhost';
  if (ws) { try { ws.close(); } catch (e) {} }
  setState('connecting', 'Connecting…');

  // Give up after 15s without an open connection.
  clearTimeout(connectTimer);
  connectTimer = setTimeout(() => {
    if (!ws || ws.readyState !== WebSocket.OPEN) {
      setState('error', "Can't connect");
      try { ws.close(); } catch (e) {}
    }
  }, 15000);

  ws = new WebSocket(`ws://${host}:48625`);
  ws.onopen = () => {
    clearTimeout(connectTimer); setState('live', 'Live');
    // If we have a saved passcode, try it immediately; otherwise probe the
    // server (it answers 'needauth' or 'blocked').
    const saved = localStorage.getItem('liftoffWebPass');
    if (saved) send({ t: 'auth', pass: saved });
    else send({ t: 'list' });
  };
  ws.onclose = () => {
    attached = null; $('detach').style.display = 'none'; updateTermView();
    // Keep showing the timeout message once it has fired; otherwise retry.
    if ($('state').textContent !== "Can't connect") {
      setState('connecting', 'Connecting…');
      setTimeout(connect, 1500);
    }
  };
  ws.onmessage = (ev) => handle(JSON.parse(ev.data));
}

function attach(tid) {
  attached = tid;
  term.clear();
  send({ t: 'attach', id: tid });
  updateTermView();
  $('detach').style.display = '';
  setTimeout(reportSize, 150);
  document.querySelectorAll('.tab').forEach(t =>
    t.classList.toggle('active', t.dataset.tid === tid));
  term.focus();
}

function detach() {
  if (attached) send({ t: 'detach' });
  attached = null;
  $('detach').style.display = 'none';
  term.clear();
  updateTermView();
}
$('detach').onclick = detach;
$('recents-head').onclick = () => {
  $('recents').classList.toggle('collapsed');
  $('recents-head').classList.toggle('open');
};

// --- Passcode gate ---
function showGate({ blocked = false, error = '' } = {}) {
  const gate = $('gate');
  gate.classList.add('show');
  gate.classList.toggle('blocked', blocked);
  $('gate-title').textContent = blocked ? 'Web Access Disabled' : 'Enter Passcode';
  $('gate-msg').textContent = blocked
    ? 'This Liftoff has no web password set. Open Liftoff on your Mac and choose Air → Set Web Password to enable browser access.'
    : 'Enter the web password set on your Mac (Liftoff → Air → Set Web Password).';
  $('gate-err').textContent = error;
  if (!blocked) setTimeout(() => $('gate-input').focus(), 50);
}
function hideGate() { $('gate').classList.remove('show', 'blocked'); }
function submitPass() {
  const pass = $('gate-input').value;
  if (!pass) return;
  send({ t: 'auth', pass });
}
$('gate-go').onclick = submitPass;
$('gate-input').addEventListener('keydown', (e) => { if (e.key === 'Enter') submitPass(); });

function handle(msg) {
  switch (msg.t) {
    case 'blocked': showGate({ blocked: true }); break;
    case 'needauth': showGate(); break;
    case 'authfail':
      localStorage.removeItem('liftoffWebPass');
      showGate({ error: 'Wrong passcode. Try again.' });
      $('gate-input').value = '';
      break;
    case 'authok':
      localStorage.setItem('liftoffWebPass', $('gate-input').value || localStorage.getItem('liftoffWebPass') || '');
      hideGate();
      send({ t: 'list' }); send({ t: 'recents' });
      break;
    case 'sessions': renderProjects(msg.items || []); break;
    case 'recents': renderRecents(msg.items || []); break;
    case 'greeting':
      $('greeting').textContent = msg.text || '';
      $('picker-greeting').textContent = msg.text || '';
      break;
    case 'size': /* informational; we drive size */ break;
    case 'snapshot':
    case 'output': term.write(b64ToBytes(msg.d)); break;
    case 'opened':
      // Newly opened project/tab — refresh and attach to it
      send({ t: 'list' });
      setTimeout(() => attach(msg.tid), 200);
      break;
  }
}

function renderProjects(items) {
  // No open projects -> show the centered picker instead of the sidebar/terminal.
  const empty = !items || items.length === 0;
  document.body.classList.toggle('empty', empty);
  if (empty) { attached = null; $('detach').style.display = 'none'; send({ t: 'recents' }); }

  const byPid = {};
  const order = [];
  for (const s of items) { if (!byPid[s.pid]) { byPid[s.pid] = []; order.push(s.pid); } byPid[s.pid].push(s); }
  const root = $('projects'); root.innerHTML = '';
  for (const pid of order) {
    const list = byPid[pid];
    const p = list[0];
    const proj = document.createElement('div'); proj.className = 'proj';
    const head = document.createElement('div'); head.className = 'proj-head';
    head.innerHTML = `<span class="bar" style="background:${p.color || '#888'}"></span>
      <span class="name">${p.pname}</span><span class="count">${list.length}</span>
      <span class="add" title="New tab">+</span>`;
    head.querySelector('.add').onclick = () => send({ t: 'newtab', pid });
    proj.appendChild(head);
    for (const s of list) {
      const tab = document.createElement('div'); tab.className = 'tab'; tab.dataset.tid = s.tid;
      tab.innerHTML = `<span>▸</span><span class="title">${s.title}</span>` +
        (s.agent ? `<span class="agent">${s.agent}</span>` : '') +
        `<span class="close" title="Close terminal">×</span>`;
      tab.onclick = () => attach(s.tid);
      tab.querySelector('.close').onclick = (e) => {
        e.stopPropagation();
        if (!confirm(`Close terminal "${s.title}"?`)) return;
        if (attached === s.tid) detach();
        send({ t: 'close', id: s.tid });
      };
      proj.appendChild(tab);
    }
    root.appendChild(proj);
  }
  // keep active highlight
  if (attached) document.querySelectorAll('.tab').forEach(t =>
    t.classList.toggle('active', t.dataset.tid === attached));
}

function renderRecents(items) {
  items = items || [];
  // Render into both the sidebar list and the empty-state picker.
  for (const rootId of ['recents', 'picker-recents-list']) {
    const root = $(rootId); root.innerHTML = '';
    for (const r of items) {
      const el = document.createElement('div'); el.className = 'recent';
      el.innerHTML = `<span class="bar" style="background:${r.color || '#888'}"></span>
        <div class="meta"><div class="nm">${r.name}</div><div class="pp">${r.path}</div></div>`;
      el.onclick = () => send({ t: 'open', path: r.path });
      root.appendChild(el);
    }
  }
  $('picker-recents-head').style.display = items.length ? '' : 'none';
}

connect();
</script>
</body>
</html>
